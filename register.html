<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規登録</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>新規登録</h1>

<input
type="text"
id="username"
placeholder="ユーザー名">

<br><br>

<input
type="password"
id="password"
placeholder="パスワード">

<br><br>

<input
type="password"
id="password-confirm"
placeholder="パスワード確認">

<br><br>

<button onclick="register()">
登録
</button>

<br><br>

<a href="login.html">

ログインへ戻る

</a>

<!-- register.html の </body> 直前に追記してください -->
<script>
  async function register() {
    alert("register() が呼ばれました");
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const response = await fetch("https://chat-app.issounino.workers.dev/api/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    console.log(response.status);
    console.log(await response.text());

    if (response.ok) {
      alert("登録成功しました！");
    } else {
      alert("登録に失敗しました");
    }
  }
</script>

</body>
</html>

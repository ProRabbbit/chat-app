<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チャット</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="topbar">

    <div id="logo">
        Chat App
    </div>

    <div id="account">

        <button id="account-button" onclick="toggleAccountMenu()">
            👤
        </button>

        <div id="account-menu">

            <button onclick="openProfile()">
                プロフィール
            </button>

            <button onclick="openSettings()">
                設定
            </button>

            <button onclick="logout()">
                ログアウト
            </button>

        </div>

    </div>

</div>

<div id="container">

    <div id="chat-list">

    <button id="new-chat" onclick="createChat()">
        ＋ 新しいグループ
    </button>

    <hr>

    <div id="chat-buttons"></div>

</div>

    <div id="chat-area">

        <div id="messages"></div>

        <br>

        <div id="input-area">

    <input
    type="text"
    id="message"
    placeholder="メッセージを入力">

    <button onclick="sendMessage()">
        送信
    </button>

</div>
    </div>

</div>

<p>ようこそ！</p>


<script>
let currentChatId = 1;

async function loadChats() {

    const response = await fetch(
        "https://chat-app.issounino.workers.dev/api/chats?username=issou"
    );

    const chats = await response.json();

    const list = document.getElementById("chat-buttons");

list.innerHTML = "";

    chats.forEach(chat => {

        list.innerHTML += `
<div class="chat-item">

    <button class="chat-button"
        onclick="selectChat(${chat.id})">
        ${chat.name}
    </button>

    <button class="menu-button"
        onclick="toggleMenu(${chat.id})">
        ⋮
    </button>

</div>

<div
    id="menu-${chat.id}"
    class="chat-menu"
    style="display:none;">

    <button onclick="renameChat(${chat.id})">
        名前変更
    </button>

    <button onclick="deleteChat(${chat.id})">
        削除
    </button>

</div>
`;

    });

}

function toggleMenu(chatId){

    const menu = document.getElementById(
        `menu-${chatId}`
    );

    if(menu.style.display === "block"){

        menu.style.display = "none";

    }else{

        menu.style.display = "block";

    }

}

function selectChat(chatId){

    currentChatId = chatId;

    loadMessages();

}
async function loadMessages() {

    const response = await fetch(
    `https://chat-app.issounino.workers.dev/api/messages?chat_id=${currentChatId}`
);

    const messages = await response.json();

    const area = document.getElementById("messages");

    area.innerHTML = "";

    messages.forEach(msg => {

        area.innerHTML += `
            <p>
                <strong>${msg.username}</strong><br>
                ${msg.message}
            </p>
        `;

    });

}

async function sendMessage() {

    const message = document.getElementById("message").value;

    const response = await fetch("https://chat-app.issounino.workers.dev/api/send", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
    username: "issou",
    chat_id: currentChatId,
    message: message
})
    });

    const result = await response.json();

    if (response.ok) {
        document.getElementById("message").value = "";

loadMessages();
    } else {
        alert(result.message);
    }
}

async function createChat() {

    console.log("createChatが呼ばれました");

    const name = prompt("グループ名を入力してください");

    console.log(name);

    if (!name) return;

    console.log("fetch開始");

    const response = await fetch(
        "https://chat-app.issounino.workers.dev/api/create-chat",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: "issou",
                name: name
            })
        }
    );

    if (response.ok) {

        loadChats();

    } else {

        const result = await response.json();

        alert(result.message);

    }

}

async function deleteChat(chatId){

    if(!confirm("このグループを削除しますか？")) return;

    const response = await fetch(
        "https://chat-app.issounino.workers.dev/api/delete-chat",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                chat_id:chatId
            })
        }
    );

    const result = await response.json();

    if(response.ok){

        loadChats();

        document.getElementById("messages").innerHTML = "";

    }else{

        alert(result.message);

    }

}

function toggleAccountMenu() {

    const menu = document.getElementById("account-menu");

    if (menu.style.display === "block") {
        menu.style.display = "none";
    } else {
        menu.style.display = "block";
    }

}

document.addEventListener("click", function(e) {

    const account = document.getElementById("account");

    if (!account.contains(e.target)) {

        document.getElementById("account-menu").style.display = "none";

    }

});

function openProfile() {

    alert("プロフィール画面はこれから作成します。");

}

function openSettings() {

    alert("設定画面はこれから作成します。");

}

loadChats();
loadMessages();
</script>

</body>
</html>
